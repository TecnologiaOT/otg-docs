name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main # Or master

permissions:
  contents: write # Required for gh-deploy to push the new branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures last-updated dates work correctly

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Optional: Speeds up future builds by caching your requirements.txt

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force